## Nginx reverse-proxy for ARP app (production)
## Replace `your-domain.com` and TLS cert paths accordingly.

server {
  listen 80;
  server_name your-domain.com www.your-domain.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name your-domain.com www.your-domain.com;

  # TLS (replace with your certificate paths)
  ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

  # Security and proxy basics
  client_max_body_size 6m; # Multer limit is 5MB
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Temporary: gate the entire site with Basic Auth (staging/protected prod)
  # To disable later, remove these two lines.
  auth_basic "Restricted Area";
  auth_basic_user_file /etc/nginx/.htpasswd;

  # Forwarded headers to Node
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Static uploads with strict content-type policy
  location ^~ /uploads/ {
    add_header X-Content-Type-Options nosniff always;
    # Only known image types
    types {
      image/jpeg jpg jpeg;
      image/png  png;
      image/webp webp;
      image/avif avif;
      image/gif  gif;
    }
    default_type application/octet-stream;
    try_files $uri @node;
  }

  # Cache typical static assets; fallback to Node
  location ~* \.(?:css|js|svg|png|jpe?g|webp|gif|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri @node;
  }

  # Proxy everything else to Node
  location / {
    try_files $uri @node;
  }

  location @node {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
