<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Room Detail - ARP Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="admin-header">
    <h1>ARP Admin</h1>
    <nav>
      <a href="index.html" data-admin-i18n="nav.dashboard">Dashboard</a>
      <a href="main.html" data-admin-i18n="nav.main">Main Page</a>
      <a href="about.html" data-admin-i18n="nav.about">About Page</a>
      <a href="rest.html" data-admin-i18n="nav.rest">Rest-Bar Page</a>
      <a href="gallery.html" data-admin-i18n="nav.gallery">Gallery Page</a>
      <a href="roomslist.html" data-admin-i18n="nav.rooms">Rooms Page</a>
      <a href="room-detail.html" class="active" data-admin-i18n="nav.room_detail">Room Detail</a>
      <a href="settings.html" data-admin-i18n="nav.settings">Settings</a>
      <a href="contact.html" data-admin-i18n="nav.contact">Contact Page</a>
      <select id="adminLangSelect" style="margin-left:auto">
        <option value="ru">Русский</option>
        <option value="en">EN</option>
        <option value="tr">Türkçe</option>
        <option value="uk">UA</option>
      </select>
      <button id="logoutBtn" class="btn btn-logout" data-admin-i18n="auth.logout">Logout</button>
    </nav>
  </header>
  <main class="container">
    <section class="card">
      <h2 data-admin-i18n="page.room_detail.title">Управление: Детали номера</h2>
      <div class="row">
        <label><span data-admin-i18n="form.lang">Язык контента</span>
          <select id="lang">
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="tr">Türkçe</option>
            <option value="de">Deutsch</option>
          </select>
        </label>
        <label><span data-admin-i18n="roomdetail.slug.label">Тип номера</span>
          <select id="slug">
            <option value="economy">Economy</option>
            <option value="standart">Standart</option>
            <option value="comfort">Comfort</option>
            <option value="queen">Queen</option>
            <option value="king">King</option>
          </select>
        </label>
      </div>

      <h3>
        <span data-admin-i18n="roomdetail.section.hero">Hero</span>
        <label class="toggle"><input type="checkbox" id="v_hero" checked> <span data-admin-i18n="toggle.show"></span></label>
      </h3>
      <h4 data-admin-i18n="roomdetail.hero.image_heading">Hero Image</h4>
      <div class="upload-card">
        <img class="upload-preview" id="p_hero" alt="preview">
        <input id="hero_image"><input type="file" id="f_hero">
      </div>
      <div class="grid-3">
        <label><span data-admin-i18n="roomdetail.hero.title_label">Title (Hero)</span> <input id="rooms_title"></label>
        <label><span data-admin-i18n="roomdetail.hero.desc_label">Description (Hero)</span> <textarea id="rooms_desc" rows="3"></textarea></label>
      </div>

      <h3>
        <span data-admin-i18n="roomdetail.section.slider">Slider</span>
        <label class="toggle"><input type="checkbox" id="v_slider" checked> <span data-admin-i18n="toggle.show"></span></label>
      </h3>
      <div class="upload-card">
        <textarea id="slides" rows="4" placeholder="/uploads/room-<slug>/...\n/...\n..."></textarea>
        <input type="file" id="f_slides" multiple accept="image/*">
      </div>

      <h3>
        <span data-admin-i18n="roomdetail.section.info">Info</span>
        <label class="toggle"><input type="checkbox" id="v_info" checked> <span data-admin-i18n="toggle.show"></span></label>
      </h3>
      <div class="grid-3">
        <label>Area <input id="area"></label>
        <label>Flooring <input id="flooring"></label>
        <label>View <input id="view"></label>
        <label>TV <input id="tv"></label>
        <label>Bed Type <input id="bedType"></label>
        <label>Capacity <input id="capacity"></label>
        <label>Smoking <input id="smoking"></label>
        <label>Balcony <input id="balcony"></label>
        <label>Check-in <input id="checkin"></label>
        <label>Check-out <input id="checkout"></label>
      </div>

      <h3>
        <span data-admin-i18n="roomdetail.section.features">Features</span>
        <label class="toggle"><input type="checkbox" id="v_features" checked> <span data-admin-i18n="toggle.show"></span></label>
      </h3>

      <div class="actions">
        <button id="loadBtn" class="btn" data-admin-i18n="action.load">Загрузить</button>
        <button id="saveBtn" class="btn btn-primary" data-admin-i18n="action.save">Сохранить</button>
        <button id="exportBtn" class="btn btn-accent" data-admin-i18n="action.export">Экспорт JSON</button>
        <button id="previewBtn" class="btn btn-secondary" data-admin-i18n="action.preview">Предпросмотр</button>
      </div>
      <p id="status" class="status"></p>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/admin-i18n.js"></script>
  <script src="js/room-detail.js"></script>
</body>
</html>
