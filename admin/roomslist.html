<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Rooms Page - ARP Admin</title>`n    <link rel="shortcut icon" href="/assets/icons/favicon.ico">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="admin-header">
    <h1>ARP Admin</h1>
    <nav>
      <a href="index.html" data-admin-i18n="nav.dashboard">Dashboard</a>
      <a href="main.html" data-admin-i18n="nav.main">Main Page</a>
      <a href="about.html" data-admin-i18n="nav.about">About Page</a>
      <a href="rest.html" data-admin-i18n="nav.rest">Rest-Bar Page</a>
      <a href="gallery.html" data-admin-i18n="nav.gallery">Gallery Page</a>
      <a href="roomslist.html" class="active" data-admin-i18n="nav.rooms">Rooms Page</a>
      <a href="room-detail.html" data-admin-i18n="nav.room_detail">Room Detail</a>
      <a href="settings.html" data-admin-i18n="nav.settings">Settings</a>
      <a href="contact.html" data-admin-i18n="nav.contact">Contact Page</a>
      <select id="adminLangSelect" style="margin-left:auto">
        <option value="ru">Русский</option>
        <option value="en">EN</option>
        <option value="tr">Turkce</option>
        <option value="uk">UA</option>
      </select>
      <button id="logoutBtn" class="btn btn-logout" data-admin-i18n="auth.logout">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2 data-admin-i18n="page.roomslist.title">Управление страницей Номера</h2>

      <div class="row">
        <label><span data-admin-i18n="form.lang">Язык контента</span>
          <select id="lang">
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="tr">Turkce</option>
            <option value="de">Deutsch</option>
          </select>
        </label>
      </div>

      <h3>
        <span data-admin-i18n="roomslist.section.hero">Hero</span>
        <label class="toggle"><input type="checkbox" id="visible_rooms_hero" checked> <span data-admin-i18n="toggle.show"></span></label>
      </h3>
      <div class="grid-3">
        <label><span data-admin-i18n="roomslist.hero.title_label">Title</span> <input id="hero_title"></label>
        <label><span data-admin-i18n="roomslist.hero.subtitle_label">Subtitle</span> <input id="hero_subtitle"></label>
      </div>
      <div class="upload-group">
        <h4 data-admin-i18n="roomslist.hero.image_heading">Hero Image</h4>
        <div class="upload-card">
          <img class="upload-preview" id="p_rooms_hero" alt="preview">
          <input id="rooms_hero_image"><input type="file" id="f_rooms_hero">
        </div>
      </div>

      <h3 data-admin-i18n="roomslist.cards.heading">Карточки номеров</h3>

      <div id="roomsForms"></div>

      <div class="actions">
        <button id="loadBtn" class="btn" data-admin-i18n="action.load">Загрузить</button>
        <button id="saveBtn" class="btn btn-primary" data-admin-i18n="action.save">Сохранить</button>
        <button id="exportBtn" class="btn btn-accent" data-admin-i18n="action.export">Экспорт JSON</button>
        <button id="previewBtn" class="btn btn-secondary" data-admin-i18n="action.preview">Предпросмотр</button>
      </div>
      <p id="status" class="status"></p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/admin-i18n.js"></script>
  <script src="js/roomslist.js"></script>
</body>
</html>
