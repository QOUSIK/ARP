<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Site Settings - ARP Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="admin-header">
    <h1>ARP Admin</h1>
    <nav>
      <a href="index.html" data-admin-i18n="nav.dashboard">Dashboard</a>
      <a href="main.html" data-admin-i18n="nav.main">Main Page</a>
      <a href="about.html" data-admin-i18n="nav.about">About Page</a>
      <a href="rest.html" data-admin-i18n="nav.rest">Rest-Bar Page</a>
      <a href="gallery.html" data-admin-i18n="nav.gallery">Gallery Page</a>
      <a href="roomslist.html" data-admin-i18n="nav.rooms">Rooms Page</a>
      <a href="room-detail.html" data-admin-i18n="nav.room_detail">Room Detail</a>
      <a href="settings.html" class="active" data-admin-i18n="nav.settings">Settings</a>
      <a href="contact.html" data-admin-i18n="nav.contact">Contact Page</a>
      <select id="adminLangSelect" style="margin-left:auto">
        <option value="ru">RU</option>
        <option value="en">EN</option>
        <option value="tr">TR</option>
        <option value="uk">UA</option>
      </select>
      <button id="logoutBtn" class="btn btn-logout" data-admin-i18n="auth.logout">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2 data-admin-i18n="page.settings.title">Настройки сайта</h2>

      <h3 data-admin-i18n="settings.gsc.heading">Google Search Console</h3>
      <div class="grid-3">
        <label><span data-admin-i18n="settings.gsc.verification_label">Verification content</span>
          <input id="gsc_verification" placeholder="например: abcdefg123456" data-admin-i18n-ph="settings.gsc.verification_placeholder" />
        </label>
      </div>

      <h3 data-admin-i18n="settings.yandex.heading">Yandex.Webmaster</h3>
      <div class="grid-3">
        <label><span data-admin-i18n="settings.yandex.code_label">Код подтверждения (yandex-verification)</span>
          <input id="yandex_verification" placeholder="например: 1234567890abcdef" data-admin-i18n-ph="settings.yandex.code_placeholder" />
        </label>
      </div>

      <h3 data-admin-i18n="settings.analytics.heading">Аналитика</h3>
      <div class="grid-3">
        <label><span data-admin-i18n="settings.analytics.ga4_label">GA4 Measurement ID</span>
          <input id="ga4_id" placeholder="G-XXXXXXXXXX" data-admin-i18n-ph="settings.analytics.ga4_placeholder" />
        </label>
        <label><span data-admin-i18n="settings.analytics.gtm_label">Google Tag Manager (Container ID)</span>
          <input id="gtm_id" placeholder="GTM-XXXXXXX" data-admin-i18n-ph="settings.analytics.gtm_placeholder" />
        </label>
        <label><span data-admin-i18n="settings.analytics.fb_label">Meta/Facebook Pixel ID</span>
          <input id="fb_pixel_id" placeholder="например: 123456789012345" data-admin-i18n-ph="settings.analytics.fb_placeholder" />
        </label>
      </div>

      <div class="actions">
        <button id="loadBtn" class="btn" data-admin-i18n="action.load">Загрузить</button>
        <button id="saveBtn" class="btn btn-primary" data-admin-i18n="action.save">Сохранить</button>
      </div>
      <p id="status" class="status"></p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/admin-i18n.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
